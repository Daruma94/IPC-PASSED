<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIM Manufacturing - Quality Passed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #f3f8fc; 
            min-height: 100vh; 
        }
        .card-shadow { box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05); }
        
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-frame {
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 10px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .glass-frame:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.25);
        }
        .glass-frame img {
            border-radius: 12px;
            width: 100%;
            height: 220px;
            object-fit: contain;
            background-color: rgba(255, 255, 255, 0.5);
        }

        #image-modal {
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .history-scroll::-webkit-scrollbar { height: 4px; }
        .history-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .history-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="flex items-center justify-center p-4 py-8">

    <div class="bg-white rounded-[32px] card-shadow w-full max-w-[420px] p-8 transition-all duration-300 relative" id="main-card">
        
        <div class="flex flex-col items-center mt-2">
            <div class="inline-flex flex-col items-center">
                <div class="w-full h-[5px] bg-[#1a337e] rounded-full mb-2"></div>
                <h1 class="text-6xl font-black text-[#1a337e] tracking-tighter leading-none">MIM</h1>
                <div class="mt-2 w-full bg-[#1a337e] text-white text-center text-[9px] font-bold py-[3px] tracking-[0.25em] rounded-sm">
                    MANUFACTURING
                </div>
            </div>
        </div>

        <div class="mt-6 mb-6 text-center">
            <h2 class="text-[20px] font-black text-[#1a2b5e] tracking-wide mb-2">QUALITY PASSED</h2>
            <p class="text-gray-500 text-[13px] leading-relaxed px-2">Masukkan kode MID untuk mengakses spesifikasi unit</p>
        </div>

        <form id="search-form" class="space-y-4">
            <div class="relative flex items-center">
                <i class="fa-solid fa-inbox absolute left-4 text-gray-400"></i>
                <input type="text" id="mid-input" required autocomplete="off" class="w-full pl-11 pr-4 py-3.5 rounded-xl border border-gray-200 focus:outline-none focus:border-[#1a337e] text-sm text-gray-700 transition-all font-medium uppercase" placeholder="Masukkan Nomor Kode (Contoh: 61171)">
            </div>
            
            <div id="error-card" class="hidden bg-red-50 border border-red-200 text-red-600 rounded-xl p-3.5 text-sm flex items-start gap-3">
                <i class="fa-solid fa-circle-exclamation mt-0.5 text-red-500 text-base"></i>
                <div>
                    <strong class="block font-semibold">Gagal Menemukan Data</strong>
                    <span id="error-message" class="text-xs">Kode MID tidak terdaftar dalam sistem repositori.</span>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-[#1a337e] hover:bg-[#12245a] text-white font-semibold py-3.5 rounded-xl flex justify-center items-center gap-2 transition-all text-[15px]">
                <i class="fa-solid fa-magnifying-glass" id="btn-icon"></i> 
                <span id="btn-text">Cari Unit</span>
            </button>
        </form>

        <div id="history-section" class="mt-6 hidden">
            <p class="text-[11px] text-gray-400 font-semibold mb-2 uppercase tracking-wider">Riwayat Terakhir</p>
            <div class="flex gap-2 overflow-x-auto history-scroll pb-2" id="history-list">
            </div>
        </div>

        <div id="result-section" class="hidden mt-6 pt-6 border-t border-gray-100">
            <div class="text-center mb-4">
                <span class="bg-green-100 text-green-700 text-xs font-bold px-3 py-1 rounded-full"><i class="fa-solid fa-check-circle mr-1"></i> VALIDATED</span>
            </div>
            
            <div class="glass-frame mb-5" onclick="openModal()">
                <img id="res-image" src="" alt="Unit Image" onerror="handleImageError(this)">
                <div class="text-center mt-2 text-[10px] text-gray-500 font-medium">
                    <i class="fa-solid fa-expand mr-1"></i> Klik gambar untuk memperbesar
                </div>
            </div>

            <div class="space-y-3">
                <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <p class="text-[11px] text-gray-400 font-semibold mb-0.5">KODE PENCARIAN (MID)</p>
                    <p id="res-id" class="text-[15px] font-bold text-[#1a2b5e] uppercase">-</p>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                        <p class="text-[11px] text-gray-400 font-semibold mb-0.5">DESKRIPSI PRODUK</p>
                        <p id="res-name" class="text-[13px] font-bold text-gray-800 truncate" title="">-</p>
                    </div>
                    <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                        <p class="text-[11px] text-gray-400 font-semibold mb-0.5">NOMOR TDK</p>
                        <p id="res-date" class="text-[13px] font-bold text-gray-800 truncate" title="">-</p>
                    </div>
                </div>

                <div class="bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                    <p class="text-[11px] text-[#1a337e] font-bold mb-1">NOTASI SUSUNAN</p>
                    <p id="res-desc" class="text-[13px] text-gray-600 leading-relaxed text-justify">-</p>
                </div>
            </div>
        </div>
    </div>

    <div id="image-modal" class="fixed inset-0 z-50 hidden flex justify-center items-center p-4 bg-black/80 transition-opacity opacity-0">
        <div class="relative w-full max-w-2xl bg-white rounded-2xl p-2 shadow-2xl transform scale-95 transition-transform" id="modal-content">
            <button onclick="closeModal()" class="absolute -top-3 -right-3 bg-red-500 hover:bg-red-600 text-white w-8 h-8 rounded-full flex items-center justify-center shadow-lg border-2 border-white transition-colors">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <img id="modal-image" src="" class="w-full rounded-xl max-h-[85vh] object-contain" alt="Full Image">
        </div>
    </div>

    <script>
        let searchHistory = [];

        document.getElementById('search-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const inputVal = document.getElementById('mid-input').value.trim();
            if(!inputVal) return;

            hideError();
            hideResult();
            setLoading(true);

            try {
                const response = await fetch('deskripsi.json');
                if (!response.ok) throw new Error("Gagal mengambil file deskripsi.json");
                
                const jsonData = await response.json();
                const records = jsonData.records || [];
                
                const matchedData = records.find(item => {
                    if (!item.mid) return false;
                    const subCodes = item.mid.split(/[\s,]+/); 
                    return subCodes.includes(inputVal);
                });

                setTimeout(() => {
                    setLoading(false);
                    if (matchedData) {
                        showResult(matchedData, inputVal);
                        addToHistory(inputVal);
                    } else {
                        showError(`Kode MID <strong>${inputVal}</strong> tidak terdaftar.`);
                    }
                }, 400);
            } catch (error) {
                setLoading(false);
                showError("Gagal mengakses database. Pastikan file deskripsi.json tersedia.");
                console.error(error);
            }
        });

        function showResult(data, searchInput) {
            document.getElementById('res-id').innerText = data.mid || searchInput;
            document.getElementById('res-name').innerText = data.deskripsi || '-';
            document.getElementById('res-date').innerText = data.tdk || '-';
            document.getElementById('res-desc').innerText = data.notasi || 'Keterangan tidak tersedia.';
            
            // --- LOGIKA GAMBAR TAHAN BANTING ---
            let fileName = data.img || `${searchInput}`;
            
            // Memastikan selalu memiliki ekstensi .png
            if (!fileName.toLowerCase().endsWith('.png')) {
                fileName += '.png';
            }
            
            // Path folder images di GitHub
            let imagePath = `images/${fileName}`;

            const imgEl = document.getElementById('res-image');
            const modalImgEl = document.getElementById('modal-image');
            
            imgEl.src = imagePath;
            modalImgEl.src = imagePath;

            const resultSection = document.getElementById('result-section');
            resultSection.classList.remove('hidden', 'fade-in');
            void resultSection.offsetWidth;
            resultSection.classList.add('fade-in');
        }

        function handleImageError(image) {
            image.onerror = null; 
            image.src = "https://placehold.co/800x600/f3f8fc/1a337e?text=Gambar+Tidak+Tersedia"; 
        }

        function hideResult() { document.getElementById('result-section').classList.add('hidden'); }
        function showError(msg) {
            const errorCard = document.getElementById('error-card');
            document.getElementById('error-message').innerHTML = msg;
            errorCard.classList.remove('hidden');
        }
        function hideError() { document.getElementById('error-card').classList.add('hidden'); }

        function setLoading(isLoading) {
            const btnIcon = document.getElementById('btn-icon');
            const btnText = document.getElementById('btn-text');
            const btn = document.getElementById('submit-btn');

            if (isLoading) {
                btn.disabled = true;
                btn.classList.add('opacity-80', 'cursor-not-allowed');
                btnIcon.className = "fa-solid fa-circle-notch fa-spin";
                btnText.innerText = "Mencari...";
            } else {
                btn.disabled = false;
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
                btnIcon.className = "fa-solid fa-magnifying-glass";
                btnText.innerText = "Cari Unit";
            }
        }

        function addToHistory(mid) {
            searchHistory = [mid, ...searchHistory.filter(item => item !== mid)].slice(0, 4);
            renderHistory();
        }

        function renderHistory() {
            const historySec = document.getElementById('history-section');
            const historyList = document.getElementById('history-list');
            
            if (searchHistory.length === 0) {
                historySec.classList.add('hidden');
                return;
            }

            historySec.classList.remove('hidden');
            historyList.innerHTML = '';

            searchHistory.forEach(mid => {
                const chip = document.createElement('button');
                chip.type = 'button';
                chip.className = 'flex-shrink-0 bg-blue-50 text-[#1a337e] border border-blue-100 px-3 py-1.5 rounded-lg text-xs font-semibold hover:bg-blue-100 transition-colors whitespace-nowrap';
                chip.innerHTML = `<i class="fa-solid fa-clock-rotate-left mr-1 opacity-70"></i> ${mid}`;
                chip.onclick = () => {
                    document.getElementById('mid-input').value = mid;
                    document.getElementById('submit-btn').click();
                };
                historyList.appendChild(chip);
            });
        }

        const modal = document.getElementById('image-modal');
        const modalContent = document.getElementById('modal-content');

        function openModal() {
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        modal.addEventListener('click', function(e) { if (e.target === modal) closeModal(); });
    </script>
</body>
</html>
