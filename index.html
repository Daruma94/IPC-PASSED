<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIM Manufacturing - Quality Passed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f3f8fc; min-height: 100vh; }
        .card-shadow { box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1a337e; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="bg-white rounded-[32px] card-shadow w-full max-w-[420px] p-8 transition-all duration-300" id="main-card">
        
        <!-- BAGIAN PENCARIAN -->
        <div id="search-section">
            <div class="flex flex-col items-center mt-4">
    <div class="inline-flex flex-col items-center">

        <!-- Garis -->
        <div class="w-full h-[5px] bg-[#1a337e] rounded-full mb-2"></div>

        <!-- Logo -->
        <h1 class="text-6xl font-black text-[#1a337e] tracking-tighter leading-none">
            MIM
        </h1>

        <!-- Manufacturing -->
        <div class="mt-2 w-full bg-[#1a337e] text-white text-center text-[9px] font-bold py-[3px] tracking-[0.25em] rounded-sm">
            MANUFACTURING
        </div>

    </div>
</div>

            <div class="mt-8 mb-6 text-center">
                <h2 class="text-[20px] font-black text-[#1a2b5e] tracking-wide mb-2">QUALITY PASSED</h2>
                <p class="text-gray-500 text-[13px] leading-relaxed px-2">Masukkan kode MID untuk mengakses spesifikasi unit</p>
            </div>

            <form id="search-form" class="space-y-4">
                <div class="relative flex items-center">
                    <i class="fa-solid fa-inbox absolute left-4 text-gray-400"></i>
                    <input type="text" id="mid-input" required class="w-full pl-11 pr-4 py-3.5 rounded-xl border border-gray-200 focus:outline-none focus:border-[#1a337e] text-sm text-gray-700 transition-all" placeholder="Masukkan nomor MID...">
                </div>
                <button type="submit" class="w-full bg-[#1a337e] hover:bg-[#12245a] text-white font-semibold py-3.5 rounded-xl flex justify-center items-center gap-2 transition-all text-[15px]">
                    <i class="fa-solid fa-magnifying-glass"></i> Cari
                </button>
            </form>
        </div>

        <!-- BAGIAN HASIL -->
        <div id="result-section" class="hidden flex-col items-center">
            <h2 class="text-lg font-black text-[#1a2b5e] mb-4" id="result-title">MID: -</h2>
            <div class="w-full aspect-square bg-gray-50 rounded-2xl border border-gray-100 flex items-center justify-center overflow-hidden mb-6 relative">
                <div id="loading-indicator" class="flex flex-col items-center gap-2"><div class="loader"></div></div>
                <img id="result-image" src="" alt="Unit Image" class="w-full h-full object-contain hidden">
                <div id="error-message" class="hidden text-gray-500 text-sm p-4 text-center"><i class="fa-solid fa-circle-xmark text-red-400 text-2xl mb-2"></i><br>Gambar tidak ditemukan</div>
            </div>
            <button id="btn-back" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-3 rounded-xl transition-all text-sm">Kembali</button>
        </div>
    </div>

    <script>
        // Daftar file yang ada di folder images/ Anda
        const imageFiles = [
            "1062739 61530.jpg",
            "61170 61529 62237 62739.jpg",
            "61171 61531 62239 62740 1061171 1062740.jpg",
            "61172.jpg",
            "61895 63244.jpg",
            "62654.jpg",
            "62748 62749.jpg",
            "62750 62751.jpg",
            "62787 62788.jpg",
            "62984.jpg",
            "63073 1063073.jpg",
            "63462.jpg"
        ];

        const form = document.getElementById('search-form');
        const input = document.getElementById('mid-input');
        const searchSection = document.getElementById('search-section');
        const resultSection = document.getElementById('result-section');
        const img = document.getElementById('result-image');
        const loader = document.getElementById('loading-indicator');
        const error = document.getElementById('error-message');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const val = input.value.trim();
            const match = imageFiles.find(f => f.includes(val));

            searchSection.classList.add('hidden');
            resultSection.classList.remove('hidden');
            resultSection.classList.add('flex');
            
            img.classList.add('hidden');
            error.classList.add('hidden');
            loader.classList.remove('hidden');

            if (match) {
                document.getElementById('result-title').textContent = "MID: " + val;
                img.src = "images/" + match;
            } else {
                loader.classList.add('hidden');
                error.classList.remove('hidden');
            }
        });

        img.onload = () => { loader.classList.add('hidden'); img.classList.remove('hidden'); };
        img.onerror = () => { loader.classList.add('hidden'); error.classList.remove('hidden'); };
        document.getElementById('btn-back').onclick = () => {
            resultSection.classList.add('hidden');
            searchSection.classList.remove('hidden');
            input.value = '';
        };
    </script>
</body>
</html>
